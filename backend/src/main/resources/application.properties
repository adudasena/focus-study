spring.application.name=focusstudy

# Conexão com o PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/focusstudydb
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=admin

# Configurações do Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Chave do Token JWT (Vital para o Security funcionar)
api.security.token.secret=${JWT_SECRET:minha-chave-ultra-secreta-estudo-flow-2026}