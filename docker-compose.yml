services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: focus_study_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - db

  frontend:
    # Ajustado para entrar na subpasta onde está o código de verdade
    build: ./frontend/frontend
    ports:
      - "5174:5174"
